name: Deploy Paperback Themes Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Build Pages site
        run: |
          rm -rf site
          mkdir site

          # Copy only .pbcolors files while preserving existing folder structure
          find . -name "*.pbcolors" -print0 | while IFS= read -r -d '' file; do
            clean="${file#./}"
            mkdir -p "site/$(dirname "$clean")"
            cp "$clean" "site/$clean"
          done

          cat > site/index.html <<'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>KenWeTech's Paperback Themes</title>

            <style>
              body {
                background: #111;
                color: #eee;
                font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
                max-width: 1000px;
                margin: auto;
                padding: 30px;
              }

              h1 {
                margin-bottom: 5px;
              }

              .info {
                background: #1b1b1b;
                border-radius: 12px;
                padding: 20px;
                margin-bottom: 25px;
              }

              .theme {
                background: #1b1b1b;
                border-radius: 12px;
                padding: 15px;
                margin: 15px 0;
              }

              a {
                color: #58a6ff;
                text-decoration: none;
              }

              a:hover {
                text-decoration: underline;
              }

              li {
                margin: 8px 0;
              }
              code {
                background: #222;
                padding: 2px 5px;
                border-radius: 4px;
              }
            </style>
          </head>

          <body>

            <h1>KenWeTech's Paperback Themes</h1>

            <div class="info">
              <p>
                Themes are organized by color or theme name.
                Each theme folder contains available variants.
              </p>

              <ul>
                <li>
                  Standard version:
                  <code>[Theme-Name]-Paperback.pbcolors</code>
                </li>

                <li>
                  Black Dark Mode version:
                  <code>[Theme-Name]-BDM-Paperback.pbcolors</code>
                  <br>
                  With a pitch-black dark mode background,
                  optimized for OLED displays.
                </li>

                <li>
                  Black All Modes version:
                  <code>[Theme-Name]-BAM-Paperback.pbcolors</code>
                  <br>
                  With a pitch-black background across
                  both light and dark modes, optimized for OLED displays.
                </li>
              </ul>
            </div>

            <div class="theme">
              <h2>Browse Themes</h2>

              <p>
                Click a theme below to download the Paperback theme file.
              </p>

              <ul>
          EOF

          find site -name "*.pbcolors" | sort | while read file; do
            clean="${file#site/}"
            filename=$(basename "$clean")

            echo "                <li><a href=\"./$clean\" download=\"$filename\">$filename</a></li>" >> site/index.html
          done

          cat >> site/index.html <<'EOF'
              </ul>
            </div>

          </body>
          </html>
          EOF

      - name: Deploy to gh_page
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh_page
          publish_dir: ./site
